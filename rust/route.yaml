# [ ROUTES ]
route:
  - method: get
    path: "/user/bonjour"
    name: getUser

  - method: post
    path: "/users/create"
    name: "createUser"

# [ DATABASES ]
database:
  - DB_CONNECTION: mysql
    DB_HOST: 127.0.0.1
    DB_PORT: 8889
    DB_DATABASE: toolbox2026
    DB_USERNAME: root
    DB_PASSWORD: root
# [ SERVER ]
server:
  - port: 8000
# [ CONFIGURATIONS ]
auth: true

# [ MODEL ]
models:
  - name: "User"
    fields:
      - name: last_name
        type: string
      - name: email
        type: string
      - name: password
        type: Int
      - name: test
        type: string
