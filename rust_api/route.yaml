# [ ROUTES ]
route:
  - method: get 
    path: "/user/bonjour"
    name: getUser

  - method: post 
    path: "/users/create"
    name: "createUser"
  
# [ DATABASES ]
database:
  - DB_CONNECTION: mysql
    DB_HOST: 127.0.0.1
    DB_PORT: 8889
    DB_DATABASE: toolbox2026
    DB_USERNAME: root
    DB_PASSWORD: root
# [ SERVER ]
server:
  - port: 8000
# [ CONFIGURATIONS ]
auth: true

# [ MODELS ]
models:
  - name: "User"
    field:
      last_name: "string"
      email: "string"
      password: "Int"

  - name: "Survey"
    field:
      creator_id: "Int"
      email: "String"
      password: "String"
